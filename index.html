<!DOCTYPE html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0" ,maximum-scale=1, user-scalable="no">
        <title>金榜题名｜高考加油</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
                font-family: "Microsoft YaHei", 宋体, sans-serif;
            }
            body {
                overflow: hidden;
                width: 100vw;
                height: 100vh;
                background: linear-gradient(135deg,#050528,#101042,#221250);
                color: #fff;
                position: relative;
            }
            #particles {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                z-index: 1;
            }
            .wrap {
                position: relative;
                z-index: 9;
                width: 100%;
                height: 100vh;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                padding: 20px;
                text-align: center;
            }
            .title-main {
                font-size: clamp(2.2rem,8vw,4.5rem);
                background: linear-gradient(90deg,#ffd700,#ff7e5f,#ffd700);
                -webkit-background-clip: text;
                color: transparent;
                text-shadow: 0 0 30px rgba(255,215,0,0.35);
                margin-bottom: 24px;
                animation: glow 3s ease-in-out infinite alternate;
            }
            @keyframes glow {
                from {filter: drop-shadow(0 0 8px #ffd700);}
                to {filter: drop-shadow(0 0 22px #ff9900);}
            }
            .count-box {
                background: rgba(255,255,255,0.08);
                backdrop-filter: blur(12px);
                border: 2px solid rgba(255,215,0,0.35);
                border-radius: 24px;
                padding: 30px 50px;
                margin:20px 0 35px;
                box-shadow: 0 0 25px rgba(255, 180, 0, 0.2);
            }
            .count-title {
                font-size: 22px;
                opacity: 0.95;
                margin-bottom:12px;
                color:#ffdf99;
                letter-spacing:2px;
            }
            .count-time {
                font-size: clamp(1.8rem,5vw,3rem);
                color: #ffdd67;
                letter-spacing: 4px;
                animation: beat 1.2s infinite;
                margin-left:40px;
            }
            @keyframes beat {
                0%,100%{transform: scale(1);}
                50%{transform: scale(1.05);}
            }
            .bless-text {
                max-width:750px;
                font-size: clamp(1rem,3vw,1.3rem);
                line-height:2;
                opacity:0.92;
                margin-bottom:32px;
            }
            .scroll-bless {
                width: min(90%,720px);
                height:70px;
                overflow:hidden;
                border:1px solid rgba(255,200,0,0.2);
                border-radius:12px;
                background:rgba(255,255,255,0.05);
                display:flex;
                align-items:center;
            }
            .scroll-inner {
                white-space: nowrap;
                animation: scroll 28s linear infinite;
                font-size:17px;
                color:#ffe89c;
            }
            @keyframes scroll {
                from {transform: translateX(100%);}
                to {transform: translateX(-100%);}
            }
            .tip {
                position:absolute;
                bottom:35px;
                font-size:15px;
                opacity:0.75;
            }
            #firework {
                position:fixed;
                top:0;
                left:0;
                z-index:999;
                pointer-events:none;
            }
            /*右下角不起眼倒计时*/
            .down-time{
                position:fixed;
                right:15px;
                bottom:12px;
                font-size:12px;
                opacity:0.35;
                z-index:9;
                color:#ffdf99;
            }
        </style>
    </head>
    <body>
        <canvas id="particles"></canvas>
        <canvas id="firework"></canvas>
        <div class="down-time" id="down"></div>

        <div class="wrap">
            <h1 class="title-main">金榜题名 · 高考必胜</h1>
            <div class="count-box">
                <div class="count-title">致全力以赴的少年</div>
                <div class="count-time">钟毅加油！</div>
            </div>
            <div class="bless-text">
                十年磨剑，今朝试锋；提笔从容自信，合笔如愿以偿。<br>
                愿钟毅乘风破浪，不负寒窗苦读，高考大捷，前程璀璨！
            </div>
            <div class="scroll-bless">
                <div class="scroll-inner">
                    钟毅旗开得胜｜钟毅超常发挥｜钟毅逢考必过｜钟毅金榜题名｜前程万里｜未来璀璨｜不负韶华｜一举夺魁｜
                    钟毅旗开得胜｜钟毅超常发挥｜钟毅逢考必过｜钟毅金榜题名｜前程万里｜未来璀璨｜不负韶华｜一举夺魁｜
                    钟毅旗开得胜｜钟毅超常发挥｜钟毅逢考必过｜钟毅金榜题名｜前程万里｜未来璀璨｜不负韶华｜一举夺魁｜
                </div>
            </div>
            <div class="tip">💡 点击任意位置原地绽放多彩礼花</div>
        </div>

        <script>
            //右下角倒计时
            function getCountDown() {
                const target = new Date('2026-06-07 09:00:00').getTime();
                const now = Date.now();
                let diff = target - now;
                if(diff<=0){
                    document.getElementById('down').innerText="高考进行中";
                    return;
                }
                const d = Math.floor(diff/(1000*60*60*24));
                const h = Math.floor((diff%(1000*60*60*24))/(1000*60*60));
                const m = Math.floor((diff%(1000*60*60))/(1000*60));
                const s = Math.floor((diff%(1000*60))/1000);
                document.getElementById('down').innerText=`距高考:${d}天${h}时${m}分${s}秒`;
            }
            getCountDown();
            setInterval(getCountDown,1000);

            //星空粒子
            const pCanvas = document.getElementById('particles');
            const pCtx = pCanvas.getContext('2d');
            function resizeCanvas(){
                pCanvas.width = window.innerWidth;
                pCanvas.height = window.innerHeight;
            }
            resizeCanvas();
            window.addEventListener('resize',resizeCanvas);
            let particleArr = [];
            class Particle{
                constructor(){
                    this.x = Math.random()*pCanvas.width;
                    this.y = Math.random()*pCanvas.height;
                    this.r = Math.random()*1.8+0.2;
                    this.speedX = (Math.random()-0.5)*0.4;
                    this.speedY = (Math.random()-0.5)*0.4;
                    this.op = Math.random()
                }
                draw(){
                    pCtx.beginPath();
                    pCtx.arc(this.x,this.y,this.r,0,Math.PI*2);
                    pCtx.fillStyle=`rgba(255,255,255,${this.op})`;
                    pCtx.fill();
                }
                update(){
                    this.x += this.speedX;
                    this.y += this.speedY;
                    if(this.x<0||this.x>pCanvas.width) this.speedX *= -1;
                    if(this.y<0||this.y>pCanvas.height) this.speedY *= -1;
                }
            }
            for(let i=0;i<180;i++) particleArr.push(new Particle());
            function animatePart(){
                pCtx.clearRect(0,0,pCanvas.width,pCanvas.height);
                particleArr.forEach(item=>{
                    item.draw();item.update();
                })
                requestAnimationFrame(animatePart);
            }
            animatePart();

            //===== 原地爆炸+多特效：四种烟花样式、星屑残留、渐变拖尾 =====
            const fCanvas = document.getElementById('firework');
            const fCtx = fCanvas.getContext('2d');
            let W = innerWidth, H = innerHeight;
            window.onresize = ()=>{W=fCanvas.width=innerWidth;H=fCanvas.height=innerHeight;};
            fCanvas.width=W;fCanvas.height=H;

            let fireList = [];
            let residueList = []; //残留星光粒子

            //四种烟花形态
            const TYPE_ARR = [1,2,3,4];

            class Fire{
                constructor(x,y){
                    this.x = x;
                    this.y = y;
                    this.hue = Math.random()*360;
                    this.type = TYPE_ARR[Math.floor(Math.random()*4)];
                    this.parts = [];
                    this.initBoom();
                }
                initBoom(){
                    let num;
                    switch(this.type){
                        case 1: num=160;break; //大圆散射
                        case 2: num=80;break;  //长拖尾
                        case 3: num=220;break; //细密星点
                        case 4: num=110;break; //不规则礼花
                    }
                    for(let i=0;i<num;i++){
                        let ang = Math.PI*2/num*i;
                        let sp = Math.random()*4+2;
                        let px = this.x + Math.cos(ang)*sp*12;
                        let py = this.y + Math.sin(ang)*sp*12;
                        this.parts.push({
                            x:this.x,y:this.y,
                            vx:Math.cos(ang)*sp,
                            vy:Math.sin(ang)*sp,
                            op:1,
                            size:Math.random()*2+1
                        })
                    }
                    //爆炸额外生成残留星光
                    for(let k=0;k<25;k++){
                        residueList.push({
                            x:this.x,y:this.y,
                            vx:(Math.random()-0.5)*2,
                            vy:(Math.random()-0.5)*2,
                            op:0.8,
                            h:this.hue+Math.random()*40
                        })
                    }
                }
            }

            document.addEventListener('click',e=>{
                fireList.push(new Fire(e.clientX,e.clientY));
            })

            function render(){
                fCtx.clearRect(0,0,W,H);
                //绘制残留星光
                for(let i=residueList.length-1;i>=0;i--){
                    let r=residueList[i];
                    r.x+=r.vx;r.y+=r.vy;r.op-=0.006;
                    fCtx.beginPath();
                    fCtx.arc(r.x,r.y,1.5,0,Math.PI*2);
                    fCtx.fillStyle=`hsla(${r.h},100%,70%,${r.op})`;
                    fCtx.fill();
                    if(r.op<=0)residueList.splice(i,1);
                }

                //绘制烟花本体
                for(let i=fireList.length-1;i>=0;i--){
                    let fw = fireList[i];
                    for(let j=fw.parts.length-1;j>=0;j--){
                        let p = fw.parts[j];
                        p.x += p.vx;
                        p.y += p.vy;
                        p.vy += 0.045;
                        p.op -= 0.011;
                        fCtx.beginPath();
                        fCtx.arc(p.x,p.y,p.size,0,Math.PI*2);
                        fCtx.fillStyle=`hsla(${fw.hue},100%,65%,${p.op})`;
                        fCtx.fill();
                        if(p.op<=0) fw.parts.splice(j,1);
                    }
                    if(fw.parts.length<=0) fireList.splice(i,1);
                }
                requestAnimationFrame(render);
            }
            render();
        </script>
    </body>
</html>
